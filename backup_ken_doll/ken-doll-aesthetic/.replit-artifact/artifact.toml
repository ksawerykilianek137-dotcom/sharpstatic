kind = "web"
previewPath = "/"
title = "Ken Doll Aesthetic"
version = "1.0.0"
id = "artifacts/ken-doll-aesthetic"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20490

[services.development]
run = "pnpm --filter @workspace/ken-doll-aesthetic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ken-doll-aesthetic", "run", "build" ]
publicDir = "artifacts/ken-doll-aesthetic/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20490"
BASE_PATH = "/"
